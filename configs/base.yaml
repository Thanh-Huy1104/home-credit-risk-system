# configs/base.yaml
project:
  seed: 42

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  duckdb_path: "data/duckdb/home_credit.duckdb"
  models_dir: "models/artifacts"
  metrics_dir: "models/metrics"
  reports_dir: "reports"
  figures_dir: "reports/figures"

dataset:
  tables:
    application_train: "csv"
    application_test: "csv"
  label_col: "TARGET"

split:
  test_size: 0.20
  val_size: 0.20
  stratify: true

model:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 4
  min_child_weight: 30
  colsample_bytree: 0.8
  subsample: 0.8
  early_stopping_rounds: 50
  tree_method: "hist"
  enable_categorical: true
  random_state: 42